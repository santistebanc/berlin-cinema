name: Scrape & Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Scrape movies
        run: npx ts-node --project tsconfig.server.json scripts/scrape.ts
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_BUILD_TIME: ${{ github.run_id }}

      - name: SPA routing fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
