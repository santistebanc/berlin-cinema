name: Scrape & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'public/movies.json'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_enrich:
        description: 'Force re-fetch all data (bypass TMDb and OSM caches)'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install

      - name: Scrape movies
        run: npx ts-node --project tsconfig.server.json scripts/scrape.ts ${{ inputs.force_enrich && '--force-enrich' || '' }}
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          OMDB_API_KEY: ${{ secrets.OMDB_API_KEY }}

      - name: Commit movies.json cache
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/movies.json
          git diff --cached --quiet || git commit -m "chore(cache): update movies.json [skip ci]"
          git push

      - name: Build
        run: npm run build
        env:
          VITE_BUILD_TIME: ${{ github.run_id }}

      - name: SPA routing fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
